<script>
    const API_URL = 'admin_api.php';
    let killSwitchMonitor = null;
    let currentKS = false;
    let currentActiveSection = 'dashboard';
    let currentTab = 'api';
    
    async function apiCall(action, data = {}, isFile = false) {
        let body, headers = {};
        if (isFile) {
            body = new FormData();
            body.append('action', action);
            for (let [k, v] of Object.entries(data)) body.append(k, v);
        } else {
            body = new URLSearchParams();
            body.append('action', action);
            for (let [k, v] of Object.entries(data)) body.append(k, v);
            headers['Content-Type'] = 'application/x-www-form-urlencoded';
        }
        const res = await fetch(API_URL, { method: 'POST', body, headers, credentials: 'include' });
        const json = await res.json();
        if (!json.success && (json.error === 'Unauthorized' || json.redirect === 'login')) {
            window.location.reload();
            throw new Error('Session expired');
        }
        return json;
    }
    
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        const icon = type === 'error' ? 'fa-circle-exclamation' : (type === 'success' ? 'fa-check-circle' : 'fa-info-circle');
        const color = type === 'error' ? '#EF4444' : (type === 'success' ? '#10B981' : '#3B82F6');
        toast.className = `toast-premium rounded-xl px-5 py-3.5 max-w-md text-sm shadow-2xl flex items-center gap-3`;
        toast.style.borderLeftColor = color;
        toast.innerHTML = `<i class="fas ${icon}" style="color:${color}"></i> <span class="text-slate-200 font-medium">${msg}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('opacity-0', 'transition-all', 'duration-300'), 3800);
        setTimeout(() => toast.remove(), 4500);
    }
    
    async function syncKillSwitch() {
        try {
            const res = await apiCall('get_kill_switch_status');
            if (res?.success) {
                updateKillUI(res.kill_switch === true, res.reason || '');
                currentKS = res.kill_switch === true;
            }
        } catch(e) { console.warn(e); }
    }
    
    function updateKillUI(active, reason) {
        const indicator = document.getElementById('ksStatusIndicator');
        const reasonDiv = document.getElementById('ksReasonDisplay');
        const bar = document.getElementById('killSwitchStatusBar');
        if (active) {
            indicator.innerHTML = '<i class="fas fa-skull-crossbones text-xs mr-1"></i><span>ACTIVE</span>';
            indicator.className = 'status-chip bg-red-500/20 text-red-300 border border-red-500';
            bar.classList.add('kill-active');
            if (reason) { reasonDiv.innerHTML = `<i class="fas fa-info-circle mr-1"></i> ${reason}`; reasonDiv.classList.remove('hidden'); }
            else reasonDiv.classList.add('hidden');
            if (!currentKS) showToast('⚠️ KILL SWITCH ACTIVATED — Loader operations halted', 'error');
        } else {
            indicator.innerHTML = '<span>INACTIVE</span>';
            indicator.className = 'status-chip bg-slate-800/50 text-slate-300';
            bar.classList.remove('kill-active');
            reasonDiv.classList.add('hidden');
        }
    }
    
    async function activateKill() {
        const reason = prompt('☠️ EMERGENCY KILL SWITCH ☠️\nThis will block the LOADER immediately.\nMulti-tool remains functional.\nEnter reason:', 'Security breach');
        if (reason === null) return;
        const btn = document.getElementById('emergencyKillBtn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Activating...';
        btn.disabled = true;
        try {
            const res = await apiCall('activate_kill_switch', { reason });
            if (res.success) {
                showToast(`💀 KILL SWITCH ACTIVE | Reason: ${reason}`, 'error');
                await syncKillSwitch();
                if (currentActiveSection) loadSection(currentActiveSection);
            } else showToast('Activation failed: ' + (res.error || 'unknown'), 'error');
        } catch(e) { showToast(e.message, 'error'); }
        finally { btn.innerHTML = orig; btn.disabled = false; }
    }
    
    async function deactivateKill() {
        if (!confirm('⚠️ DEACTIVATE KILL SWITCH? This will restore Loader access. Proceed?')) return;
        const res = await apiCall('deactivate_kill_switch');
        if (res.success) {
            showToast('✅ Kill switch deactivated. Loader access restored.', 'success');
            await syncKillSwitch();
            if (currentActiveSection) loadSection(currentActiveSection);
        } else showToast('Deactivation failed', 'error');
    }
    
    function startKillMonitor() {
        if (killSwitchMonitor) clearInterval(killSwitchMonitor);
        killSwitchMonitor = setInterval(() => syncKillSwitch(), 7500);
    }
    
    async function renderDashboard() {
        const stats = await apiCall('dashboard_stats');
        const activeStats = await apiCall('get_active_users_stats');
        
        const onlinePercent = stats.activeDevices > 0 ? Math.round((activeStats.currently_active || 0) / stats.activeDevices * 100) : 0;
        const quotaPercent = stats.total_limit > 0 ? Math.round((stats.total_used || 0) / stats.total_limit * 100) : 0;
        
        let platformRows = '';
        if (activeStats.platforms) {
            for (const [platform, count] of Object.entries(activeStats.platforms)) {
                const perc = activeStats.currently_active > 0 ? Math.round((count / activeStats.currently_active) * 100) : 0;

    window.closeKeyModal = function() {
        const modal = document.getElementById('keyModal');
        if (modal) modal.remove();

    window.createKeyWithType = async function(type) {
        const label = document.getElementById('keyLabel')?.value;
        const expiryType = document.getElementById('expiryType')?.value;
        const expiryValue = document.getElementById('expiryValue')?.value;
        const maxDevices = document.getElementById('maxDevices')?.value;
        const bypassAll = document.getElementById('bypassAll')?.checked;
        
        if (!label) { showToast('Label is required', 'error'); return; }
        
        if (type === 'api') {
            const limit = parseInt(document.getElementById('keyLimit')?.value);
            const res = await apiCall('create_key', { label, limit, expiry_type: expiryType, expiry_value: expiryValue, max_devices: maxDevices, bypass_all: bypassAll });
            if (res.success) {
                showToast(`API Key created: ${res.api_key}`, 'success');
                closeKeyModal();
                renderKeys();
            } else {
                showToast('Creation failed: ' + (res.error || 'Unknown'), 'error');
            }
        } else {
            const res = await apiCall('create_codm_key', { label, expiry_type: expiryType, expiry_value: expiryValue, max_devices: maxDevices, bypass_all: bypassAll });
            if (res.success) {
                showToast(`CODM License created: ${res.api_key}`, 'success');
                closeKeyModal();
                renderKeys();
            } else {
                showToast('Creation failed: ' + (res.error || 'Unknown'), 'error');
            }
        }
    };

            if (res.success) {

            }
        }
    };

    window.changeLoaderVersion = async function() {
        const newVersion = prompt('Enter new loader version (e.g., 7.2.0):', '7.2.0');
        if (!newVersion) return;
        const res = await apiCall('update_loader_version', { version: newVersion });
        if (res.success) {
            showToast(`Loader version changed to ${newVersion}`, 'success');
            renderLoaderMulti();
            if (currentActiveSection === 'dashboard') renderDashboard();
        } else {
            showToast('Failed to change version', 'error');
        }
    };

    async function loadSection(section) {
        currentActiveSection = section;
        const content = document.getElementById('dynamicContent');
        content.innerHTML = `<div class="flex justify-center items-center h-64"><div class="w-10 h-10 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div></div>`;
        try {
            if (section === 'dashboard') await renderDashboard();
            else if (section === 'keys') await renderKeys();
            else if (section === 'devices') await renderDevices();
            else if (section === 'allowed') await renderAllowedDevices();
            else if (section === 'blacklists') await renderBlacklists();
            else if (section === 'maintenance') await renderMaintenance();
            else if (section === 'loader') await renderLoaderMulti();
            else if (section === 'backups') await renderBackups();
            else if (section === 'proxies') await renderProxies();
            else if (section === 'logs') await renderLogsLeaks();
            else if (section === 'security') await renderSecurity();
            else if (section === 'admin') await renderAdminProfile();
            else content.innerHTML = '<div class="text-center text-slate-500 p-12">Module offline</div>';
        } catch(e) { showToast(e.message, 'error'); content.innerHTML = '<div class="text-red-400 text-center p-10">Failed to load component</div>'; }
    }
    
    document.getElementById('doLoginBtn').onclick = async () => {
        const user = document.getElementById('loginUser').value, pass = document.getElementById('loginPass').value;
        if (!user || !pass) { showToast('Access credentials required', 'error'); return; }
        const btn = document.getElementById('doLoginBtn');
        const origHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
        btn.disabled = true;
        const res = await apiCall('login', { username: user, password: pass });
        if (res.success && res.logged_in) {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('appContainer').classList.remove('hidden');
            startKillMonitor();
            loadSection('dashboard');
            showToast(`Welcome, ${user} — nexus online`, 'success');
        } else showToast(res.error || 'Authentication failure', 'error');
        btn.innerHTML = origHtml;
        btn.disabled = false;
    };
    
    document.getElementById('logoutBtn').onclick = async () => { if(killSwitchMonitor) clearInterval(killSwitchMonitor); await apiCall('logout'); window.location.reload(); };
    document.getElementById('emergencyKillBtn').onclick = async () => { await syncKillSwitch(); if(currentKS) deactivateKill(); else activateKill(); };
    
    document.querySelectorAll('.sidebar-item').forEach(el => {
        el.addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            loadSection(el.dataset.section);
        });
    });
    
    (async function initAuth() { try { const auth = await apiCall('check_auth'); if(auth.logged_in) { document.getElementById('loginOverlay').classList.add('hidden'); document.getElementById('appContainer').classList.remove('hidden'); startKillMonitor(); loadSection('dashboard'); } } catch(e) {} })();
    
    function generateParticles() {
        const container = document.getElementById('particlesContainer');
        for (let i = 0; i < 70; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const s = Math.random() * 4 + 1;
            p.style.width = s + 'px';
            p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 18 + 's';
            p.style.animationDuration = Math.random() * 14 + 7 + 's';
            p.style.opacity = Math.random() * 0.4;
            p.style.background = `radial-gradient(circle, ${Math.random() > 0.6 ? '#3B82F6' : '#A855F7'}, transparent)`;
            container.appendChild(p);
        }
    }
    generateParticles();
    window.showToast = showToast;
    window.LOADER_VERSION = '7.1.0-SECURE';
</script>
